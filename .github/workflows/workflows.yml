name: CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: adservice
            context: ./src/adservice
            dockerfile: ./src/adservice/Dockerfile
          - name: cartservice
            context: ./src/cartservice/src
            dockerfile: ./src/cartservice/src/Dockerfile
          - name: checkoutservice
            context: ./src/checkoutservice
            dockerfile: ./src/checkoutservice/Dockerfile
          - name: currencyservice
            context: ./src/currencyservice
            dockerfile: ./src/currencyservice/Dockerfile
          - name: emailservice
            context: ./src/emailservice
            dockerfile: ./src/emailservice/Dockerfile
          - name: frontend
            context: ./src/frontend
            dockerfile: ./src/frontend/Dockerfile
          - name: loadgenerator
            context: ./src/loadgenerator
            dockerfile: ./src/loadgenerator/Dockerfile
          - name: paymentservice
            context: ./src/paymentservice
            dockerfile: ./src/paymentservice/Dockerfile
          - name: productcatalogservice
            context: ./src/productcatalogservice
            dockerfile: ./src/productcatalogservice/Dockerfile
          - name: recommendationservice
            context: ./src/recommendationservice
            dockerfile: ./src/recommendationservice/Dockerfile
          - name: shippingservice
            context: ./src/shippingservice
            dockerfile: ./src/shippingservice/Dockerfile
          - name: shoppingassistantservice
            context: ./src/shoppingassistantservice
            dockerfile: ./src/shoppingassistantservice/Dockerfile
    env:
      IMAGE_REGISTRY: ghcr.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
